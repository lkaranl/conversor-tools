<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor-Tools | Compressor de Mídia</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
</head>

<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <main class="container">
        <!-- Cabeçalho -->
        <header class="app-header">
            <div class="logo">
                <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" />
                </svg>
                <span>Conversor-<strong>Tools</strong></span>
            </div>
            <p class="tagline">Compressão de mídia de alta performance, via Rust &amp; FFmpeg</p>
        </header>

        <!-- Painel Principal -->
        <div class="glass-panel">

            <!-- Nível de Compressão -->
            <section class="compression-section">
                <label class="section-label">Nível de Compressão</label>
                <div class="compression-pills" id="compression-pills">
                    <button class="pill-btn" data-level="1" type="button">
                        <span class="pill-icon">🟢</span>
                        <span class="pill-name">Leve</span>
                        <span class="pill-sub">Melhor qualidade</span>
                    </button>
                    <button class="pill-btn active" data-level="2" type="button">
                        <span class="pill-icon">🟡</span>
                        <span class="pill-name">Média</span>
                        <span class="pill-sub">Equilibrado</span>
                    </button>
                    <button class="pill-btn" data-level="3" type="button">
                        <span class="pill-icon">🔴</span>
                        <span class="pill-name">Alta</span>
                        <span class="pill-sub">Menor tamanho</span>
                    </button>
                    <button class="pill-btn" data-level="4" type="button">
                        <span class="pill-icon">⚫</span>
                        <span class="pill-name">Extrema</span>
                        <span class="pill-sub">Dane-se a qualidade</span>
                    </button>
                </div>
            </section>


            <div class="divider"></div>

            <!-- Upload -->
            <section id="upload-section">
                <div id="dropzone" class="dropzone">
                    <!-- Estado padrão: vazio -->
                    <div class="dropzone-content" id="dropzone-default">
                        <div class="dropzone-icon-wrap">
                            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                                <polyline points="17 8 12 3 7 8" />
                                <line x1="12" y1="3" x2="12" y2="15" />
                            </svg>
                        </div>
                        <h3>Arraste seus arquivos aqui</h3>
                        <p>ou <span class="highlight">clique para procurar</span></p>
                        <span class="dropzone-hint" id="dropzone-hint">Detecção automática (.mp4, .png, .jpg, .jpeg, .mp3, .m4a, .pdf)</span>
                    </div>
                    <!-- Estado com arquivos selecionados -->
                    <div class="dropzone-content file-preview hidden" id="dropzone-preview">
                        <div id="selected-files-list" class="selected-files-list">
                            <!-- Items will be injected here -->
                        </div>
                        <div class="preview-actions mt-4">
                            <button class="change-file-btn" id="add-more-btn" type="button">Adicionar mais</button>
                            <button class="change-file-btn" id="clear-all-btn" type="button" style="color: var(--danger)">Limpar tudo</button>
                        </div>
                    </div>
                    <input type="file" id="file-input" accept=".mp4,.png,.jpg,.jpeg,.mp3,.m4a,.pdf" multiple hidden>
                </div>
                <div class="error-message" id="error-message"></div>
                <button id="compress-btn" class="button primary mt-4 hidden" type="button">
                    <svg style="width:16px;height:16px;vertical-align:-3px;margin-right:6px" viewBox="0 0 24 24"
                        fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
                        stroke-linejoin="round">
                        <polyline points="8 17 12 21 16 17" />
                        <line x1="12" y1="3" x2="12" y2="21" />
                    </svg>
                    Comprimir Todos
                </button>
            </section>


            <!-- Processando e Resultados (Unificado para Lista) -->
            <section id="status-section" class="status-section hidden">
                <div class="status-header">
                    <h3 id="batch-status-title">Processando arquivos...</h3>
                    <div class="batch-progress-container">
                        <div class="progress-bar-wrapper">
                            <div id="batch-progress-bar" class="progress-bar-fill"></div>
                        </div>
                        <span id="batch-progress-text">0/0 concluídos</span>
                    </div>
                </div>
                
                <div id="jobs-list" class="jobs-list">
                    <!-- Individual jobs progress items injected here -->
                </div>

                <div id="batch-actions" class="action-buttons-row mt-4 hidden" style="display: flex; gap: 10px; justify-content: center;">
                    <button id="reset-btn" class="button secondary" style="flex: 1;">Novo Processamento</button>
                </div>
            </section>

        </div>
    </main>

    <script src="/app.js"></script>
</body>

</html>
