<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor-Tools | Compressor de Mídia</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
</head>

<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <main class="container">
        <!-- Cabeçalho -->
        <header class="app-header">
            <div class="logo">
                <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" />
                </svg>
                <span>Conversor-<strong>Tools</strong></span>
            </div>
            <p class="tagline">Compressão de mídia de alta performance, via Rust &amp; FFmpeg</p>
        </header>

        <!-- Painel Principal -->
        <div class="glass-panel">

            <!-- Seletor de Tipo de Mídia -->
            <section class="media-type-section">
                <label class="section-label">Tipo de Mídia</label>
                <div class="media-type-grid" id="media-type-grid">
                    <button class="media-card active" data-type="mp4" data-accept="video/mp4,.mp4" id="btn-mp4">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <rect x="2" y="3" width="20" height="14" rx="2" />
                            <path d="M8 21h8M12 17v4" />
                            <circle cx="10" cy="10" r="1" fill="currentColor" />
                            <path d="m10 10 4-2v4l-4-2z" fill="currentColor" stroke="none" />
                        </svg>
                        <span class="media-type-name">MP4</span>
                        <span class="media-type-desc">Vídeo</span>
                    </button>
                    <button class="media-card coming-soon" disabled data-type="mp3">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M9 18V5l12-2v13" />
                            <circle cx="6" cy="18" r="3" />
                            <circle cx="18" cy="16" r="3" />
                        </svg>
                        <span class="media-type-name">MP3</span>
                        <span class="media-type-desc">Áudio</span>
                        <span class="badge-soon">Em breve</span>
                    </button>
                    <button class="media-card" data-type="png" data-accept="image/png,.png" id="btn-png">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <rect x="3" y="3" width="18" height="18" rx="2" />
                            <circle cx="8.5" cy="8.5" r="1.5" />
                            <path d="M21 15l-5-5L5 21" />
                        </svg>
                        <span class="media-type-name">PNG</span>
                        <span class="media-type-desc">Imagem</span>
                    </button>
                    <button class="media-card" data-type="jpeg" data-accept="image/jpeg,.jpg,.jpeg" id="btn-jpeg">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <rect x="3" y="3" width="18" height="18" rx="2" />
                            <circle cx="8.5" cy="8.5" r="1.5" />
                            <path d="M21 15l-5-5L5 21" />
                        </svg>
                        <span class="media-type-name">JPEG</span>
                        <span class="media-type-desc">Imagem</span>
                    </button>
                </div>
            </section>

            <div class="divider"></div>

            <!-- Nível de Compressão -->
            <section class="compression-section">
                <label class="section-label">Nível de Compressão</label>
                <div class="compression-pills" id="compression-pills">
                    <button class="pill-btn" data-level="1" type="button">
                        <span class="pill-icon">🟢</span>
                        <span class="pill-name">Leve</span>
                        <span class="pill-sub">Melhor qualidade</span>
                    </button>
                    <button class="pill-btn active" data-level="2" type="button">
                        <span class="pill-icon">🟡</span>
                        <span class="pill-name">Média</span>
                        <span class="pill-sub">Equilibrado</span>
                    </button>
                    <button class="pill-btn" data-level="3" type="button">
                        <span class="pill-icon">🔴</span>
                        <span class="pill-name">Alta</span>
                        <span class="pill-sub">Menor tamanho</span>
                    </button>
                    <button class="pill-btn" data-level="4" type="button">
                        <span class="pill-icon">⚫</span>
                        <span class="pill-name">Extrema</span>
                        <span class="pill-sub">Dane-se a qualidade</span>
                    </button>
                </div>
            </section>


            <div class="divider"></div>

            <!-- Upload -->
            <section id="upload-section">
                <div id="dropzone" class="dropzone">
                    <!-- Estado padrão: vazio -->
                    <div class="dropzone-content" id="dropzone-default">
                        <div class="dropzone-icon-wrap">
                            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                                <polyline points="17 8 12 3 7 8" />
                                <line x1="12" y1="3" x2="12" y2="15" />
                            </svg>
                        </div>
                        <h3>Arraste seu arquivo aqui</h3>
                        <p>ou <span class="highlight">clique para procurar</span></p>
                        <span class="dropzone-hint" id="dropzone-hint">Aceita arquivos .mp4</span>
                    </div>
                    <!-- Estado com arquivo selecionado -->
                    <div class="dropzone-content file-preview hidden" id="dropzone-preview">
                        <div class="file-icon-wrap">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7z" />
                                <polyline points="14 2 14 8 20 8" />
                                <path d="m10 11 5 3-5 3z" fill="currentColor" stroke="none" />
                            </svg>
                        </div>
                        <p class="file-name" id="selected-file-name">video.mp4</p>
                        <span class="file-size" id="selected-file-size">0 MB</span>
                        <button class="change-file-btn" id="change-file-btn" type="button">Trocar arquivo</button>
                    </div>
                    <input type="file" id="file-input" accept="video/mp4,.mp4" hidden>
                </div>
                <div class="error-message" id="error-message"></div>
                <button id="compress-btn" class="button primary mt-4 hidden" type="button">
                    <svg style="width:16px;height:16px;vertical-align:-3px;margin-right:6px" viewBox="0 0 24 24"
                        fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
                        stroke-linejoin="round">
                        <polyline points="8 17 12 21 16 17" />
                        <line x1="12" y1="3" x2="12" y2="21" />
                    </svg>
                    Comprimir Agora
                </button>
            </section>


            <!-- Processando -->
            <section id="processing-section" class="processing hidden">
                <div class="spinner"></div>
                <h3 id="status-title">Processando arquivo...</h3>
                <p id="status-desc" class="sub-text">O tempo depende do tamanho do arquivo.</p>
            </section>

            <!-- Resultado -->
            <section id="result-section" class="result hidden">
                <div class="success-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
                        <polyline points="22 4 12 14.01 9 11.01" />
                    </svg>
                </div>
                <h3>Compressão Concluída!</h3>
                <p class="sub-text" id="final-filename">video.mp4</p>
                <a href="#" id="download-btn" class="button primary mt-2">Baixar Arquivo Otimizado</a>

                <div class="action-buttons-row mt-4" style="display: flex; gap: 10px; justify-content: center;">
                    <button id="retry-level-btn" class="button secondary" style="flex: 1;">Tentar outro nível</button>
                    <button id="reset-btn" class="button secondary" style="flex: 1;">Novo arquivo</button>
                </div>
            </section>

        </div>
    </main>

    <script src="/app.js"></script>
</body>

</html>
